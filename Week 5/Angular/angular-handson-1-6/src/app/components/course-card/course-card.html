<div
  appHighlight="lightblue"
  [ngClass]="cardClasses"
  [ngStyle]="{
    'border-left': '6px solid ' + borderColor,
    'padding-left': '10px'
  }"
>

  <h3>{{ course.name }}</h3>

  <p><strong>Code:</strong> {{ course.code }}</p>

  <p><strong>Credits:</strong> {{ course.credits | creditLabel }}</p>

  <div [ngSwitch]="course.gradeStatus">

    <p *ngSwitchCase="'passed'">
      🟢 Passed
    </p>

    <p *ngSwitchCase="'failed'">
      🔴 Failed
    </p>

    <p *ngSwitchCase="'pending'">
      ⚪ Pending
    </p>

    <p *ngSwitchDefault>
      Unknown Status
    </p>

  </div>

  <button (click)="enroll()">
    Enroll
  </button>

  <button (click)="toggleDetails()">
    Show Details
  </button>

</div>

<hr>
