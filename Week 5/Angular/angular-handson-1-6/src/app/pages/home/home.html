<h1>{{ portalName }}</h1>

<p>
  Manage your courses, view your profile and track your academic progress.
</p>

<p><strong>Courses Available:</strong> {{ coursesCount }}</p>
<p><strong>Enrolled:</strong> 3</p>
<p><strong>GPA:</strong> 3.8</p>

<hr>

<button [disabled]="!isPortalActive"
        (click)="onEnrollClick()">
  Enroll Now
</button>

<p>{{ message }}</p>

<hr>

<input
  type="text"
  placeholder="Search courses"
  [(ngModel)]="searchTerm">

<p>Searching for: {{ searchTerm }}</p>
